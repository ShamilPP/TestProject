name: android_client
description: "Shamil System Android Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.4.0
  socket_io_client: ^3.0.2

  # State Management
  provider: ^6.1.5

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # Background Service
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^20.1.0

  # Utilities
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  device_info_plus: ^11.0.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
